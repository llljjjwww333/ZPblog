services:
  - type: web
    name: zpblog-backend
    runtime: docker
    branch: master
    plan: starter
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zpblog-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: AI_API_KEY
        sync: false
      - key: AI_API_BASE
        value: ""
      - key: AI_MODEL
        value: gpt-3.5-turbo
  - type: web
    name: zpblog-frontend
    runtime: static
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: zpblog-db
    plan: free
    postgresMajorVersion: "15"
